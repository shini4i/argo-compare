repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-added-large-files
      - id: no-commit-to-branch
        args:
          - --branch=main
  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
      - id: hadolint
        args:
          - --ignore=DL3018
  # TekWizely/pre-commit-golang is the maintained successor to the archived
  # dnephin/pre-commit-golang. It has no stable tag yet; v1.0.0-rc.4 is the
  # newest published rev. All hooks require their tool on PATH (provided by the
  # Nix devShell), which is consistent with how CI runs everything.
  - repo: https://github.com/TekWizely/pre-commit-golang
    rev: v1.0.0-rc.4
    hooks:
      - id: go-fmt
      - id: go-imports
      - id: go-mod-tidy
      # Ratchet: --new-from-rev=HEAD reports only issues introduced by the
      # staged changes, so the pre-existing backlog never blocks a commit.
      # golangci-lint bundles gocognit and gosec, covering complexity and
      # security on new code. The -mod variant runs `golangci-lint run ./...`
      # at the module root (needed for --new-from-rev to see the whole package).
      - id: golangci-lint-mod
        args: [--new-from-rev=HEAD]

  # Secret scanning runs locally before a commit lands, so credentials never
  # reach a commit or CI. filesystem mode scans the staged files pre-commit
  # passes in (so no vendored/false-positive noise, and the about-to-be-
  # committed content is actually scanned). Uses the trufflehog binary from
  # the flake devshell (language: system), not the upstream hook's Go build;
  # that nixpkgs binary already disables the self-updater, so --no-update must
  # NOT be passed (it errors as a repeated flag).
  - repo: local
    hooks:
      - id: trufflehog
        name: TruffleHog secret scan
        entry: trufflehog filesystem --results=verified,unknown --fail
        language: system
