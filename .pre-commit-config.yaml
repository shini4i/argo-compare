repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-added-large-files
      - id: no-commit-to-branch
        args:
          - --branch=main
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint
        args:
          - --ignore=DL3018
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
      - id: go-mod-tidy
      - id: go-imports
  - repo: local
    hooks:
      # Ratchet lint: only flags issues introduced by the staged changes
      # (--new-from-rev=HEAD), so the pre-existing backlog never blocks a
      # commit. golangci-lint bundles gocognit and gosec, so this single hook
      # covers complexity and security checks too. Runs from the Nix devShell
      # (provided on PATH via direnv); not vendored by pre-commit itself.
      - id: golangci-lint
        name: golangci-lint (new code only)
        entry: golangci-lint run --new-from-rev=HEAD
        types: [go]
        language: system
        pass_filenames: false
