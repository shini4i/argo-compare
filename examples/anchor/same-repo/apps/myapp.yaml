apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: myapp
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: myapp
  source:
    repoURL: ssh://git@git.example.com/group/repo.git
    path: charts/myapp
    targetRevision: main
    helm:
      releaseName: myapp
      values: |
        replicaCount: 2
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
