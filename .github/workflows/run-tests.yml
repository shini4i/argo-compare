name: Run unit tests
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Full history so golangci-lint can resolve the merge base for
          # --new-from-merge-base (ratchet lint of PR-introduced issues).
          fetch-depth: 0
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6

      - name: Generate mocks
        # cmd/argo-compare/mocks/ is gitignored and generated by mockgen. The
        # analysis steps below (golangci-lint, tests) typecheck the full package
        # graph, which imports the mocks package, so it must exist before they
        # run. The test step regenerates it via its task dep. (gosec and
        # govulncheck run separately in security.yml.)
        run: nix develop --command task mocks

      - name: Lint new code (golangci-lint)
        # Ratchet: only fail on issues this PR introduces relative to its base
        # branch. The pre-existing backlog is paid down incrementally, not all
        # at once. Pushes to main skip this — they already passed PR checks.
        if: github.event_name == 'pull_request'
        # base_ref is passed via env (not interpolated into the run block) so a
        # branch name containing shell metacharacters can't inject code.
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin "$BASE_REF"
          nix develop --command golangci-lint run --new-from-merge-base="origin/$BASE_REF"

      - name: Run tests
        run: nix develop --command task test-coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out
