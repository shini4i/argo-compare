name: Security

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # gosec and govulncheck both need the Nix devshell and generated mocks, so
  # they share one job to set that up once. continue-on-error on each scan plus
  # the final gate means BOTH run to completion even if one finds problems —
  # the job collects all findings in a single pass and only then fails.
  go-scan:
    name: Go scanners (gosec + govulncheck)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6

      - name: Generate mocks
        # cmd/argo-compare/mocks/ is gitignored and generated by mockgen. gosec
        # and govulncheck typecheck the full package graph, which imports the
        # mocks package, so it must exist before they run.
        run: nix develop --command task mocks

      - name: Run Gosec Security Scanner
        id: gosec
        continue-on-error: true
        run: nix develop --command gosec -exclude-dir=.gomod -exclude-dir=.go ./...

      - name: Run govulncheck
        id: govulncheck
        continue-on-error: true
        run: nix develop --command govulncheck ./...

      - name: Fail if any Go scanner failed
        if: steps.gosec.outcome == 'failure' || steps.govulncheck.outcome == 'failure'
        run: |
          echo "gosec: ${{ steps.gosec.outcome }}"
          echo "govulncheck: ${{ steps.govulncheck.outcome }}"
          exit 1

  trivy:
    name: Trivy (dependency vulnerabilities)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Scan dependencies
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: '1'
          # .gomod/.go are the GOPATH/module cache the flake devshell creates
          # locally (gitignored, absent in CI). Excluded so a local `trivy fs`
          # doesn't flag stale cached module versions — mirrors gosec.
          skip-dirs: .gomod,.go

  trufflehog:
    name: TruffleHog (secret scan)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Full history so the scan can diff the pushed/PR commit range.
          fetch-depth: 0
          persist-credentials: false

      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@d411fff7b8879a62509f3fa98c07f247ac089a51 # v3.95.5
        with:
          extra_args: --results=verified,unknown
